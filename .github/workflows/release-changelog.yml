name: Release Changelog
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer without "v" (e.g. 0.2.0)'
        required: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_TAG: v${{ inputs.version }}
    steps:
      - name: Checkout repository with SSH
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate version and ensure tag does not already exist
        run: |
          VERSION="$RELEASE_VERSION"
          echo "$VERSION" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' >/dev/null
          TAG="$RELEASE_TAG"
          git fetch --tags origin
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Refusing to continue."
            exit 1
          fi

      - name: Create tag locally
        run: |
          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.release.toml
          args: --tag "${{ env.RELEASE_TAG }}" --strip all -o new_notes.md

      - name: Insert release notes into CHANGELOG.md
        run: |
          # Find the line number of the first version header (starts with ##)
          LINE=$(grep -n "^## " CHANGELOG.md | head -n 1 | cut -d: -f1)
          if [ -z "$LINE" ]; then
            # Fallback if no version header exists yet
            LINE=$(wc -l < CHANGELOG.md)
            LINE=$((LINE + 1))
          fi
          
          # Insert the new notes before the first version header
          head -n $((LINE - 1)) CHANGELOG.md > CHANGELOG.tmp
          cat new_notes.md >> CHANGELOG.tmp
          tail -n +$LINE CHANGELOG.md >> CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit and push CHANGELOG and updated tag
        run: |
          git add CHANGELOG.md
          git commit -m "chore: update changelog for $RELEASE_TAG" || echo "No changes to commit"
          # Update the tag to point to the changelog commit
          git tag -f -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push origin main
          git push origin "$RELEASE_TAG"